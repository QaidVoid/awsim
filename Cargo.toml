[workspace]
resolver = "3"
members = [
    "crates/awsim",
    "crates/awsim-cloudwatch-logs",
    "crates/awsim-core",
    "crates/awsim-dynamodb",
    "crates/awsim-eventbridge",
    "crates/awsim-iam",
    "crates/awsim-kinesis",
    "crates/awsim-kms",
    "crates/awsim-lambda",
    "crates/awsim-s3",
    "crates/awsim-secretsmanager",
    "crates/awsim-sns",
    "crates/awsim-sqs",
    "crates/awsim-ssm",
    "crates/awsim-sts",
    "crates/awsim-stepfunctions",
]

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
repository = "https://github.com/qaidvoid/awsim"

[workspace.dependencies]
awsim-cloudwatch-logs = { path = "crates/awsim-cloudwatch-logs" }
awsim-core = { path = "crates/awsim-core" }
awsim-eventbridge = { path = "crates/awsim-eventbridge" }
awsim-dynamodb = { path = "crates/awsim-dynamodb" }
awsim-iam = { path = "crates/awsim-iam" }
awsim-kinesis = { path = "crates/awsim-kinesis" }
awsim-kms = { path = "crates/awsim-kms" }
awsim-lambda = { path = "crates/awsim-lambda" }
awsim-secretsmanager = { path = "crates/awsim-secretsmanager" }
awsim-s3 = { path = "crates/awsim-s3" }
awsim-sns = { path = "crates/awsim-sns" }
awsim-sqs = { path = "crates/awsim-sqs" }
awsim-ssm = { path = "crates/awsim-ssm" }
awsim-sts = { path = "crates/awsim-sts" }
awsim-stepfunctions = { path = "crates/awsim-stepfunctions" }

# Async
tokio = { version = "1", features = ["full"] }
async-trait = "0.1"

# Web
axum = "0.8"
tower = "0.5"
tower-http = { version = "0.6", features = ["cors", "trace"] }
hyper = { version = "1", features = ["full"] }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"
quick-xml = { version = "0.37", features = ["serialize"] }
serde_urlencoded = "0.7"

# Error handling
thiserror = "2"
anyhow = "1"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }

# Concurrency
dashmap = "6"

# CLI
clap = { version = "4", features = ["derive", "env"] }

# Config
toml = "0.8"

# Crypto
uuid = { version = "1", features = ["v4"] }
md-5 = "0.10"
base64 = "0.22"
sha2 = "0.10"
