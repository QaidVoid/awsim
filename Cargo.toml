[workspace.package]
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
repository = "https://github.com/QaidVoid/awsim"

[workspace.dependencies]
awsim-apigateway = { path = "crates/awsim-apigateway", version = "0.1.0" }
awsim-appsync = { path = "crates/awsim-appsync", version = "0.1.0" }
awsim-athena = { path = "crates/awsim-athena", version = "0.1.0" }
awsim-bedrock = { path = "crates/awsim-bedrock", version = "0.1.0" }
awsim-cloudformation = { path = "crates/awsim-cloudformation", version = "0.1.0" }
awsim-cloudfront = { path = "crates/awsim-cloudfront", version = "0.1.0" }
awsim-cloudwatch-logs = { path = "crates/awsim-cloudwatch-logs", version = "0.1.0" }
awsim-cognito = { path = "crates/awsim-cognito", version = "0.1.0" }
awsim-core = { path = "crates/awsim-core", version = "0.1.0" }
awsim-ec2 = { path = "crates/awsim-ec2", version = "0.1.0" }
awsim-ecr = { path = "crates/awsim-ecr", version = "0.1.0" }
awsim-ecs = { path = "crates/awsim-ecs", version = "0.1.0" }
awsim-eventbridge = { path = "crates/awsim-eventbridge", version = "0.1.0" }
awsim-elb = { path = "crates/awsim-elb", version = "0.1.0" }
awsim-glue = { path = "crates/awsim-glue", version = "0.1.0" }
awsim-dynamodb = { path = "crates/awsim-dynamodb", version = "0.1.0" }
awsim-iam = { path = "crates/awsim-iam", version = "0.1.0" }
awsim-iam-policy = { path = "crates/awsim-iam-policy", version = "0.1.0" }
awsim-rds = { path = "crates/awsim-rds", version = "0.1.0" }
awsim-kinesis = { path = "crates/awsim-kinesis", version = "0.1.0" }
awsim-kms = { path = "crates/awsim-kms", version = "0.1.0" }
awsim-lambda = { path = "crates/awsim-lambda", version = "0.1.0" }
awsim-route53 = { path = "crates/awsim-route53", version = "0.1.0" }
awsim-cloudwatch-metrics = { path = "crates/awsim-cloudwatch-metrics", version = "0.1.0" }
awsim-secretsmanager = { path = "crates/awsim-secretsmanager", version = "0.1.0" }
awsim-s3 = { path = "crates/awsim-s3", version = "0.1.0" }
awsim-ses = { path = "crates/awsim-ses", version = "0.1.0" }
awsim-sns = { path = "crates/awsim-sns", version = "0.1.0" }
awsim-sqs = { path = "crates/awsim-sqs", version = "0.1.0" }
awsim-ssm = { path = "crates/awsim-ssm", version = "0.1.0" }
awsim-sts = { path = "crates/awsim-sts", version = "0.1.0" }
awsim-stepfunctions = { path = "crates/awsim-stepfunctions", version = "0.1.0" }
awsim-acm = { path = "crates/awsim-acm", version = "0.1.0" }
awsim-waf = { path = "crates/awsim-waf", version = "0.1.0" }
awsim-scheduler = { path = "crates/awsim-scheduler", version = "0.1.0" }
awsim-comprehend = { path = "crates/awsim-comprehend", version = "0.1.0" }
awsim-kendra = { path = "crates/awsim-kendra", version = "0.1.0" }
awsim-opensearch = { path = "crates/awsim-opensearch", version = "0.1.0" }
awsim-organizations = { path = "crates/awsim-organizations", version = "0.1.0" }
awsim-cloudtrail = { path = "crates/awsim-cloudtrail", version = "0.1.0" }
awsim-eks = { path = "crates/awsim-eks", version = "0.1.0" }
awsim-firehose = { path = "crates/awsim-firehose", version = "0.1.0" }
awsim-batch = { path = "crates/awsim-batch", version = "0.1.0" }
awsim-sso-admin = { path = "crates/awsim-sso-admin", version = "0.1.0" }
awsim-datasync = { path = "crates/awsim-datasync", version = "0.1.0" }
awsim-polly = { path = "crates/awsim-polly", version = "0.1.0" }
awsim-resourcegroupstagging = { path = "crates/awsim-resourcegroupstagging", version = "0.1.0" }
awsim-pipes = { path = "crates/awsim-pipes", version = "0.1.0" }
awsim-efs = { path = "crates/awsim-efs", version = "0.1.0" }
awsim-backup = { path = "crates/awsim-backup", version = "0.1.0" }
awsim-application-autoscaling = { path = "crates/awsim-application-autoscaling", version = "0.1.0" }
awsim-xray = { path = "crates/awsim-xray", version = "0.1.0" }
awsim-servicediscovery = { path = "crates/awsim-servicediscovery", version = "0.1.0" }
awsim-appconfig = { path = "crates/awsim-appconfig", version = "0.1.0" }
awsim-glacier = { path = "crates/awsim-glacier", version = "0.1.0" }
awsim-mq = { path = "crates/awsim-mq", version = "0.1.0" }
awsim-memorydb = { path = "crates/awsim-memorydb", version = "0.1.0" }
awsim-qldb = { path = "crates/awsim-qldb", version = "0.1.0" }
awsim-transfer = { path = "crates/awsim-transfer", version = "0.1.0" }

# Async
tokio = { version = "1", features = ["full"] }
tokio-stream = { version = "0.1", features = ["sync"] }
async-trait = "0.1"

# Web
axum = "0.8"
tower = "0.5"
tower-http = { version = "0.6", features = ["cors", "trace"] }
hyper = { version = "1", features = ["full"] }
bytes = "1"

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = { version = "1", features = ["preserve_order"] }
saphyr = "0.0.6"
quick-xml = { version = "0.37", features = ["serialize"] }
serde_urlencoded = "0.7"

# Error handling
thiserror = "2"
anyhow = "1"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }

# Concurrency
dashmap = "6"

# CLI
clap = { version = "4", features = ["derive", "env"] }

# Config
toml = "0.8"

# Crypto
uuid = { version = "1", features = ["v4"] }
md-5 = "0.10"
base64 = "0.22"
sha2 = "0.10"
zip = "2"
rand = "0.8"

# Policy / matching
regex = "1"
ipnet = "2"
chrono = { version = "0.4", features = ["serde"] }

[profile.dev.package.awsim-conformance]
opt-level = 0
codegen-units = 256

[profile.release.package.awsim-conformance]
codegen-units = 16

