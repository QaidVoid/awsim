    "crates/awsim-core",
    "crates/awsim-dynamodb",
    "crates/awsim-ec2",
    "crates/awsim-ecr",
    "crates/awsim-ecs",
    "crates/awsim-eventbridge",
    "crates/awsim-elb",
    "crates/awsim-glue",
    "crates/awsim-iam",
    "crates/awsim-rds",
    "crates/awsim-kinesis",
    "crates/awsim-kms",
    "crates/awsim-lambda",
    "crates/awsim-route53",
    "crates/awsim-cloudwatch-metrics",
    "crates/awsim-s3",
    "crates/awsim-secretsmanager",
    "crates/awsim-ses",
    "crates/awsim-sns",
    "crates/awsim-sqs",
    "crates/awsim-ssm",
    "crates/awsim-sts",
    "crates/awsim-stepfunctions",
    "crates/awsim-acm",
    "crates/awsim-waf",
    "crates/awsim-scheduler",
    "crates/awsim-comprehend",
    "crates/awsim-kendra",
    "crates/awsim-opensearch",
    "crates/awsim-iam-policy",
    "crates/awsim-organizations",
    "crates/awsim-cloudtrail",
    "crates/awsim-eks",
    "crates/awsim-firehose",
    "crates/awsim-batch",
    "crates/awsim-sso-admin",
    "crates/awsim-datasync",
    "crates/awsim-polly",
    "crates/awsim-resourcegroupstagging",
    "crates/awsim-pipes",
    "crates/awsim-efs",
    "crates/awsim-backup",
    "crates/awsim-application-autoscaling",
    "crates/awsim-xray",
    "crates/awsim-servicediscovery",
    "crates/awsim-appconfig",
    "crates/awsim-glacier",
    "crates/awsim-mq",
    "crates/awsim-memorydb",
    "crates/awsim-qldb",
    "crates/awsim-transfer",
    "crates/awsim-conformance",
    "crates/awsim-enforcement-tests",
