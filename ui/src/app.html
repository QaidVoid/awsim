<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="text-scale" content="scale" />
    <meta name="theme-color" content="#1a1a1f" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Geist:wght@300..700&family=Geist+Mono:wght@300..600&display=swap"
    />
    <script>
      // Apply persisted theme before first paint to prevent flash.
      (function () {
        try {
          const saved = localStorage.getItem("awsim-theme");
          const theme = saved === "light" ? "light" : "dark";
          document.documentElement.classList.remove("dark", "light");
          document.documentElement.classList.add(theme);
        } catch (_) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
