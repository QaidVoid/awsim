<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="text-scale" content="scale" />
    <meta name="theme-color" content="#1a1a1f" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Geist:wght@300..700&family=Geist+Mono:wght@300..600&display=swap"
    />
    <script>
      // Apply persisted theme + variant before first paint to prevent flash.
      (function () {
        var DARK_VARIANTS = ["dark", "midnight", "slate", "solarized"];
        var ALL = DARK_VARIANTS.concat(["light"]);
        var root = document.documentElement;
        try {
          var saved = localStorage.getItem("awsim-theme");
          if (ALL.indexOf(saved) === -1) saved = "dark";
          root.classList.remove(
            "dark",
            "light",
            "theme-midnight",
            "theme-slate",
            "theme-solarized"
          );
          if (saved === "light") {
            root.classList.add("light");
          } else {
            root.classList.add("dark");
            if (saved !== "dark") root.classList.add("theme-" + saved);
          }
        } catch (_) {
          root.classList.add("dark");
        }
      })();
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
