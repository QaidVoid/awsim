name: Nightly

on:
  schedule:
    # 03:00 UTC every day
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.xz
          - target: aarch64-unknown-linux-musl
            os: ubuntu-24.04-arm
            archive: tar.xz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.xz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.xz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install build tools (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y musl-tools mold clang

      - uses: Swatinem/rust-cache@v2
        with:
          key: nightly-${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} --bin awsim

      - name: Package (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar cJf ../../../awsim-${{ matrix.target }}.tar.xz awsim
          cd ../../..

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path target/${{ matrix.target }}/release/awsim.exe -DestinationPath awsim-${{ matrix.target }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: awsim-${{ matrix.target }}
          path: awsim-${{ matrix.target }}.${{ matrix.archive }}

  publish:
    name: Republish nightly release
    needs: build
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          shopt -s nullglob
          files=(awsim-*.tar.xz awsim-*.zip)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No artifacts produced; nothing to publish" >&2
            exit 1
          fi
          sha256sum "${files[@]}" > SHA256SUMS

      - name: Compose release notes
        id: notes
        shell: bash
        run: |
          short=$(git rev-parse --short HEAD)
          subject=$(git log -1 --pretty=%s)
          {
            echo "Rolling pre-release rebuilt from \`main\` every night."
            echo
            echo "**Commit:** [\`$short\`](https://github.com/${{ github.repository }}/commit/${{ github.sha }}) — $subject"
            echo "**Built:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            echo
            echo "These binaries track \`main\` and may be unstable. For tagged releases see https://github.com/${{ github.repository }}/releases/latest."
          } > NIGHTLY_NOTES.md

      - name: Refresh nightly tag
        # Force-move the `nightly` tag to the current commit so the
        # release page links to the right source.
        run: |
          git tag -f nightly
          git push origin nightly --force

      - name: Republish nightly release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: Nightly
          prerelease: true
          body_path: NIGHTLY_NOTES.md
          files: |
            awsim-*.tar.xz
            awsim-*.zip
            SHA256SUMS

  docker:
    name: Build + push nightly container image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/awsim
          # Stamp every nightly with a short SHA in addition to the rolling
          # `nightly` tag so users who pinned to a known-good build don't get
          # silently bumped on the next run.
          tags: |
            type=raw,value=nightly
            type=sha,prefix=nightly-,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=nightly
          cache-to: type=gha,mode=max,scope=nightly
