name: Nightly

on:
  schedule:
    # 03:00 UTC every day
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.xz
          - target: aarch64-unknown-linux-musl
            os: ubuntu-24.04-arm
            archive: tar.xz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.xz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.xz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install build tools (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y musl-tools mold clang

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build admin UI
        # `rust-embed` reads `ui/build/` at compile time, so the UI must be
        # built before cargo build or the binary ships the "UI not built"
        # placeholder.
        shell: bash
        run: |
          cd ui
          bun install --frozen-lockfile
          NODE_ENV=production bun run build

      - uses: Swatinem/rust-cache@v2
        with:
          key: nightly-${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} --bin awsim

      - name: Package (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar cJf ../../../awsim-${{ matrix.target }}.tar.xz awsim
          cd ../../..

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path target/${{ matrix.target }}/release/awsim.exe -DestinationPath awsim-${{ matrix.target }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: awsim-${{ matrix.target }}
          path: awsim-${{ matrix.target }}.${{ matrix.archive }}

  publish:
    name: Republish nightly release
    needs: build
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          shopt -s nullglob
          files=(awsim-*.tar.xz awsim-*.zip)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No artifacts produced; nothing to publish" >&2
            exit 1
          fi
          sha256sum "${files[@]}" > SHA256SUMS

      - name: Compose release notes
        id: notes
        shell: bash
        run: |
          short=$(git rev-parse --short HEAD)
          subject=$(git log -1 --pretty=%s)
          {
            echo "Rolling pre-release rebuilt from \`main\` every night."
            echo
            echo "**Commit:** [\`$short\`](https://github.com/${{ github.repository }}/commit/${{ github.sha }}) — $subject"
            echo "**Built:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            echo
            echo "These binaries track \`main\` and may be unstable. For tagged releases see https://github.com/${{ github.repository }}/releases/latest."
          } > NIGHTLY_NOTES.md

      - name: Refresh nightly tag
        run: |
          git tag -f nightly
          git push origin nightly --force

      - name: Delete previous nightly release (keep tag)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete nightly \
            --repo "${{ github.repository }}" \
            --yes \
            || true

      - name: Publish nightly release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: Nightly
          prerelease: true
          target_commitish: ${{ github.sha }}
          body_path: NIGHTLY_NOTES.md
          files: |
            awsim-*.tar.xz
            awsim-*.zip
            SHA256SUMS

  docker:
    name: Build container image (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Lowercase image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/awsim" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/${{ matrix.arch }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          outputs: type=image,name=${{ steps.image.outputs.name }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=nightly-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=nightly-${{ matrix.arch }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - uses: actions/upload-artifact@v4
        with:
          name: docker-digests-${{ matrix.arch }}
          path: /tmp/digests/*
          retention-days: 1

  docker-merge:
    name: Merge multi-arch nightly image
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: docker-digests-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3

      - name: Lowercase image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/awsim" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=nightly
            type=sha,prefix=nightly-,format=short

      - name: Create multi-arch manifest
        working-directory: /tmp/digests
        env:
          IMAGE_NAME: ${{ steps.image.outputs.name }}
        run: |
          tags=$(jq -cr '.tags | map("--tag " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON")
          digests=$(printf "$IMAGE_NAME@sha256:%s " *)
          docker buildx imagetools create $tags $digests
